name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Lint Python files if present
        run: |
          if find . -path './.git' -prune -o -name '*.py' -print -quit | grep -q .; then
            ruff check .
          else
            echo 'No Python files yet.'
          fi

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo 'No tests directory yet.'
          fi

      - name: Validate Docker Compose if present
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config
          else
            echo 'No docker-compose.yml yet.'
          fi
